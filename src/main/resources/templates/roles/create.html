<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Role</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
		  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

<div class="container mt-4">

    <h2>Create Role</h2>
	<div class="toast-container position-fixed top-0 end-0 p-3">

	    <!-- Success Toast -->
	    <div th:if="${success}" 
	         class="toast text-bg-success border-0"
	         role="alert"
	         id="successToast">

	        <div class="d-flex">
	            <div class="toast-body" th:text="${success}">
	            </div>

	            <button type="button"
	                    class="btn-close btn-close-white me-2 m-auto"
	                    data-bs-dismiss="toast">
	            </button>
	        </div>

	    </div>

	    <!-- Error Toast -->
	    <div th:if="${error}" 
	         class="toast text-bg-danger border-0"
	         role="alert"
	         id="errorToast">

	        <div class="d-flex">
	            <div class="toast-body" th:text="${error}">
	            </div>

	            <button type="button"
	                    class="btn-close btn-close-white me-2 m-auto"
	                    data-bs-dismiss="toast">
	            </button>
	        </div>

	    </div>

	</div>
    
	<form th:action="@{/roles/create}" th:object="${role}" method="post">

	    <div class="mb-3">
	        <label for="name" class="form-label">Name</label>

	        <input type="text" class="form-control" th:field="*{name}"
				th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
				<span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="invalid-feedback" />
	    </div>
		
	    <div class="mb-3">
	        <label for="description" class="form-label">Description</label>

	        <input type="text" class="form-control" th:field="*{description}"
				th:classappend="${#fields.hasErrors('description')} ? 'is-invalid'">
			<span th:if="${#fields.hasErrors('description')}" th:errors="*{description}" class="invalid-feedback" />
	    </div>

	    <button class="btn btn-success">Create</button>
		<a href="/roles" class="btn btn-secondary">
			Back
		</a>
	</form>
</div>
<script>

document.addEventListener("DOMContentLoaded", function () {

    const successToast = document.getElementById("successToast");
    const errorToast = document.getElementById("errorToast");

    if (successToast) {
        const toast = new bootstrap.Toast(successToast, { delay: 2000 });
        toast.show();
    }

    if (errorToast) {
        const toast = new bootstrap.Toast(errorToast, { delay: 2000 });
        toast.show();
    }

});

</script>
</body>
</html>
