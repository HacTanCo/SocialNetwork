<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>Roles</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

	<div class="container mt-4">

		<h2>Role Management</h2>
		<div class="toast-container position-fixed top-0 end-0 p-3">

			<!-- Success Toast -->
			<div th:if="${success}" class="toast text-bg-success border-0" role="alert" id="successToast">

				<div class="d-flex">
					<div class="toast-body" th:text="${success}">
					</div>

					<button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast">
					</button>
				</div>

			</div>

		</div>
		<a href="/roles/create" class="btn btn-primary mb-3">
			Create Role
		</a>

		<table class="table table-bordered table-hover">
			<thead>
				<tr>
					<th scope="col">ID</th>
					<th scope="col">Name</th>
					<th scope="col">Description</th>
					<th width="200">Actions</th>
				</tr>
			</thead>

			<tbody>

				<tr th:each="role : ${roles}">
					<td th:text="${role.id}"></td>
					<td th:text="${role.name}"></td>
					<td th:text="${role.description}"></td>

					<td>

						<a th:href="@{/roles/{id}(id=${role.id})}" class="btn btn-warning btn-sm">
							Update
						</a>

						<form th:action="@{/roles/delete/{id}(id=${role.id})}" method="post" style="display:inline">

							

							<button class="btn btn-danger btn-sm"
							        th:onclick="|return confirm('Delete role id: ${role.id}?')|">
							    Delete
							</button>

						</form>

					</td>

				</tr>

			</tbody>
		</table>

	</div>
	<script>

		document.addEventListener("DOMContentLoaded", function () {

			const successToast = document.getElementById("successToast");
			const errorToast = document.getElementById("errorToast");

			if (successToast) {
				const toast = new bootstrap.Toast(successToast, {delay: 2000});
				toast.show();
			}

			if (errorToast) {
				const toast = new bootstrap.Toast(errorToast, {delay: 2000});
				toast.show();
			}

		});

	</script>
</body>

</html>
