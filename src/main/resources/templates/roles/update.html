<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Role</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

<div class="container mt-4">

    <h2>Edit Role</h2>

    <form th:action="@{/roles/update}"
          method="post">

        <input type="hidden" name="id" th:value="${role.id}"/>

        <div class="mb-3">
            <label>Name</label>
            <input type="text"
                   class="form-control"
                   name="name"
                   th:value="${role.name}">
        </div>

        <div class="mb-3">
            <label>Description</label>
            <input type="text"
                   class="form-control"
                   name="description"
                   th:value="${role.description}">
        </div>

        <button class="btn btn-primary">
            Update
        </button>

        <a href="/roles" class="btn btn-secondary">
            Back
        </a>

    </form>

</div>

</body>
</html>
