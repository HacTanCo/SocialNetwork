<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title>Chỉnh sửa Role - Admin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <link rel="stylesheet" th:href="@{/assets/css/admin.css}">
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}">
</head>

<body>
    <!-- SIDEBAR -->
    <div th:replace="~{admin/layout/admin-layout :: sidebar('roles')}"></div>

    <!-- MAIN CONTENT -->
    <div class="admin-main">
        <!-- HEADER -->
        <div th:replace="~{admin/layout/admin-layout :: header('Chỉnh sửa Role')}"></div>

        <!-- TOAST -->
        <div th:replace="~{admin/layout/admin-layout :: toasts}"></div>

        <!-- CONTENT -->
        <div class="admin-content">
            <div class="admin-table-wrapper">
                <div class="admin-table-header">
                    <h6><i class="bi bi-pencil-square me-2"></i>Chỉnh sửa Role</h6>
                    <a th:href="@{/roles}" class="btn btn-sm btn-outline-secondary">
                        <i class="bi bi-arrow-left"></i> Quay lại
                    </a>
                </div>

                <div style="padding: 20px;">
                    <form th:action="@{/roles/update}" method="post">
                        <input type="hidden" name="id" th:value="${role.id}"/>

                        <div class="mb-3">
                            <label class="form-label">Tên Role</label>
                            <input type="text" class="form-control" name="name"
                                   th:value="${role.name}"
                                   placeholder="Nhập tên role">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Mô tả</label>
                            <input type="text" class="form-control" name="description"
                                   th:value="${role.description}"
                                   placeholder="Nhập mô tả role">
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn-admin btn-toggle">
                                <i class="bi bi-check-lg"></i> Cập nhật
                            </button>
                            <a th:href="@{/roles}" class="btn-admin btn-delete">
                                <i class="bi bi-x-lg"></i> Hủy
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const successToast = document.getElementById("successToast");
            const errorToast = document.getElementById("errorToast");
            if (successToast) new bootstrap.Toast(successToast, { delay: 3000 }).show();
            if (errorToast) new bootstrap.Toast(errorToast, { delay: 3000 }).show();
        });
    </script>
</body>

</html>
