<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title>Quản lý Comment - Admin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <link rel="stylesheet" th:href="@{/assets/css/admin.css}">
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}">
</head>

<body>
    <!-- SIDEBAR -->
    <div th:replace="~{admin/layout/admin-layout :: sidebar('comments')}"></div>

    <!-- MAIN CONTENT -->
    <div class="admin-main">
        <!-- HEADER -->
        <div th:replace="~{admin/layout/admin-layout :: header('Quản lý bình luận')}"></div>

        <!-- TOAST -->
        <div th:replace="~{admin/layout/admin-layout :: toasts}"></div>

        <!-- CONTENT -->
        <div class="admin-content">
            <div class="admin-table-wrapper">
                <div class="admin-table-header">
                    <h6><i class="bi bi-chat-dots-fill me-2"></i>Danh sách bình luận</h6>
                </div>

                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Người bình luận</th>
                            <th>Nội dung</th>
                            <th>Post ID</th>
                            <th>Thời gian</th>
                            <th width="100">Hành động</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="comment : ${comments}">
                            <td th:text="${comment.id}"></td>
                            <td>
                                <div class="user-info-cell">
                                    <img th:src="@{${comment.user.avatar}}" alt="avatar">
                                    <div>
                                        <div class="user-name" th:text="${comment.user.name}"></div>
                                    </div>
                                </div>
                            </td>
                            <td>
                                <div class="content-truncate" th:text="${comment.content}"></div>
                            </td>
                            <td>
                                <span class="badge bg-secondary" th:text="'#' + ${comment.post.id}"></span>
                            </td>
                            <td>
                                <small class="text-muted"
                                       th:text="${comment.createdAt != null} ? ${T(vn.hactanco.socialnetwork.helper.TinhThoiGian).timeAgo(comment.createdAt)} : 'N/A'">
                                </small>
                            </td>
                            <td>
                                <form th:action="@{/admin/comments/{id}/delete(id=${comment.id})}"
                                      method="post" style="display: inline;">
                                    <button type="submit" class="btn-admin btn-delete"
                                            th:onclick="|return confirm('Xóa comment #${comment.id}?')|">
                                        <i class="bi bi-trash"></i> Xóa
                                    </button>
                                </form>
                            </td>
                        </tr>

                        <tr th:if="${#lists.isEmpty(comments)}">
                            <td colspan="6" class="text-center text-muted py-4">
                                <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                                Không có bình luận nào
                            </td>
                        </tr>
                    </tbody>
                </table>

                <!-- Pagination -->
                <div th:replace="~{admin/layout/admin-layout :: pagination('/admin/comments', ${currentPage}, ${totalPages}, ${null})}"></div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const successToast = document.getElementById("successToast");
            const errorToast = document.getElementById("errorToast");
            if (successToast) new bootstrap.Toast(successToast, { delay: 3000 }).show();
            if (errorToast) new bootstrap.Toast(errorToast, { delay: 3000 }).show();
        });
    </script>
</body>

</html>
