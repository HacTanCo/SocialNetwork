<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title>Quản lý User - Admin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <link rel="stylesheet" th:href="@{/assets/css/admin.css}">
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}">
</head>

<body>
    <!-- SIDEBAR -->
    <div th:replace="~{admin/layout/admin-layout :: sidebar('users')}"></div>

    <!-- MAIN CONTENT -->
    <div class="admin-main">
        <!-- HEADER -->
        <div th:replace="~{admin/layout/admin-layout :: header('Quản lý User')}"></div>

        <!-- TOAST -->
        <div th:replace="~{admin/layout/admin-layout :: toasts}"></div>

        <!-- CONTENT -->
        <div class="admin-content">
            <div class="admin-table-wrapper">
                <div class="admin-table-header">
                    <h6><i class="bi bi-people-fill me-2"></i>Danh sách người dùng</h6>

                    <!-- Search -->
                    <form th:action="@{/admin/users}" method="get" class="admin-search">
                        <input type="text" name="keyword" placeholder="Tìm theo tên hoặc email..."
                               th:value="${keyword}">
                        <button type="submit">
                            <i class="bi bi-search"></i> Tìm
                        </button>
                    </form>
                </div>

                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Người dùng</th>
                            <th>Role</th>
                            <th>Trạng thái</th>
                            <th>Ngày tạo</th>
                            <th width="280">Hành động</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user : ${users}">
                            <td th:text="${user.id}"></td>
                            <td>
                                <div class="user-info-cell">
                                    <img th:src="@{${user.avatar}}" alt="avatar">
                                    <div>
                                        <div class="user-name" th:text="${user.name}"></div>
                                        <div class="user-email" th:text="${user.email}"></div>
                                    </div>
                                </div>
                            </td>
                            <td>
                                <!-- Change Role Form -->
                                <form th:if="${user.id != currentUserId}"
                                      th:action="@{/admin/users/{id}/change-role(id=${user.id})}"
                                      method="post" style="display: inline;">
                                    <select name="roleId" class="role-select"
                                            onchange="this.form.submit()">
                                        <option th:each="role : ${roles}"
                                                th:value="${role.id}"
                                                th:text="${role.name}"
                                                th:selected="${user.role.id == role.id}">
                                        </option>
                                    </select>
                                </form>
                                <!-- Hiển thị role nhưng không cho thay đổi nếu là chính mình -->
                                <span th:if="${user.id == currentUserId}" class="badge-role"
                                      th:text="${user.role.name}">
                                </span>
                            </td>
                            <td>
                                <span class="badge-active"
                                      th:classappend="${user.isActive != null and user.isActive} ? 'active' : 'inactive'">
                                    <i class="bi" th:classappend="${user.isActive != null and user.isActive} ? 'bi-check-circle-fill' : 'bi-x-circle-fill'"></i>
                                    <span th:text="${user.isActive != null and user.isActive} ? 'Active' : 'Locked'"></span>
                                </span>
                            </td>
                            <td>
                                <small class="text-muted"
                                       th:text="${user.createdAt != null} ? ${T(vn.hactanco.socialnetwork.helper.TinhThoiGian).timeAgo(user.createdAt)} : 'N/A'">
                                </small>
                            </td>
                            <td>
                                <!-- Không hiển thị nút Khóa/Xóa cho chính mình -->
                                <th:block th:if="${user.id != currentUserId}">
                                    <!-- Toggle Active -->
                                    <form th:action="@{/admin/users/{id}/toggle-active(id=${user.id})}"
                                          method="post" style="display: inline;">
                                        <button type="submit" class="btn-admin btn-toggle"
                                                th:text="${user.isActive != null and user.isActive} ? 'Khóa' : 'Mở khóa'">
                                        </button>
                                    </form>

                                    <!-- Delete -->
                                    <form th:action="@{/admin/users/{id}/delete(id=${user.id})}"
                                          method="post" style="display: inline;">
                                        <button type="submit" class="btn-admin btn-delete"
                                                onclick="return confirm('Bạn có chắc muốn xóa user này?')">
                                            <i class="bi bi-trash"></i> Xóa
                                        </button>
                                    </form>
                                </th:block>
                                <span th:if="${user.id == currentUserId}" class="text-muted">
                                    <i class="bi bi-shield-lock"></i> Tài khoản của bạn
                                </span>
                            </td>
                        </tr>

                        <tr th:if="${#lists.isEmpty(users)}">
                            <td colspan="6" class="text-center text-muted py-4">
                                <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                                Không tìm thấy user nào
                            </td>
                        </tr>
                    </tbody>
                </table>

                <!-- Pagination -->
                <div th:replace="~{admin/layout/admin-layout :: pagination('/admin/users', ${currentPage}, ${totalPages}, ${keyword})}"></div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const successToast = document.getElementById("successToast");
            const errorToast = document.getElementById("errorToast");
            if (successToast) new bootstrap.Toast(successToast, { delay: 3000 }).show();
            if (errorToast) new bootstrap.Toast(errorToast, { delay: 3000 }).show();
        });
    </script>
</body>

</html>
