<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title>Admin Dashboard - Social Network</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

    <!-- Admin CSS -->
    <link rel="stylesheet" th:href="@{/assets/css/admin.css}">
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}">
</head>

<body>
    <!-- SIDEBAR -->
    <div th:replace="~{admin/layout/admin-layout :: sidebar('dashboard')}"></div>

    <!-- MAIN CONTENT -->
    <div class="admin-main">
        <!-- HEADER -->
        <div th:replace="~{admin/layout/admin-layout :: header('Dashboard')}"></div>

        <!-- TOAST -->
        <div th:replace="~{admin/layout/admin-layout :: toasts}"></div>

        <!-- CONTENT -->
        <div class="admin-content">

            <!-- STAT CARDS -->
            <div class="row g-4 mb-4">
                <div class="col-xl-3 col-md-6">
                    <div class="stat-card">
                        <div class="stat-icon users">
                            <i class="bi bi-people-fill"></i>
                        </div>
                        <div class="stat-value" th:text="${totalUsers}">0</div>
                        <div class="stat-label">Tổng người dùng</div>
                    </div>
                </div>

                <div class="col-xl-3 col-md-6">
                    <div class="stat-card">
                        <div class="stat-icon posts">
                            <i class="bi bi-file-earmark-text-fill"></i>
                        </div>
                        <div class="stat-value" th:text="${totalPosts}">0</div>
                        <div class="stat-label">Tổng bài viết</div>
                    </div>
                </div>

                <div class="col-xl-3 col-md-6">
                    <div class="stat-card">
                        <div class="stat-icon comments">
                            <i class="bi bi-chat-dots-fill"></i>
                        </div>
                        <div class="stat-value" th:text="${totalComments}">0</div>
                        <div class="stat-label">Tổng bình luận</div>
                    </div>
                </div>

                <div class="col-xl-3 col-md-6">
                    <div class="stat-card">
                        <div class="stat-icon likes">
                            <i class="bi bi-heart-fill"></i>
                        </div>
                        <div class="stat-value" th:text="${totalLikes}">0</div>
                        <div class="stat-label">Tổng lượt thích</div>
                    </div>
                </div>
            </div>

            <!-- CHARTS -->
            <div class="row g-4 mb-4">
                <div class="col-md-6">
                    <div class="chart-card">
                        <h6><i class="bi bi-bar-chart-fill me-2"></i>User đăng ký theo tháng</h6>
                        <canvas id="usersChart" height="250"></canvas>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="chart-card">
                        <h6><i class="bi bi-bar-chart-fill me-2"></i>Bài viết theo tháng</h6>
                        <canvas id="postsChart" height="250"></canvas>
                    </div>
                </div>
            </div>

            <!-- RECENT DATA -->
            <div class="row g-4">
                <!-- Recent Users -->
                <div class="col-md-6">
                    <div class="admin-table-wrapper">
                        <div class="admin-table-header">
                            <h6><i class="bi bi-people me-2"></i>User mới nhất</h6>
                            <a th:href="@{/admin/users}" class="btn btn-sm btn-outline-primary">Xem tất cả</a>
                        </div>
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>User</th>
                                    <th>Role</th>
                                    <th>Trạng thái</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="user : ${recentUsers}">
                                    <td>
                                        <div class="user-info-cell">
                                            <img th:src="@{${user.avatar}}" alt="avatar">
                                            <div>
                                                <div class="user-name" th:text="${user.name}"></div>
                                                <div class="user-email" th:text="${user.email}"></div>
                                            </div>
                                        </div>
                                    </td>
                                    <td>
                                        <span class="badge-role"
                                              th:classappend="${user.role.name == 'ADMIN'} ? 'admin' : ''"
                                              th:text="${user.role.name}">
                                        </span>
                                    </td>
                                    <td>
                                        <span class="badge-active"
                                              th:classappend="${user.isActive != null and user.isActive} ? 'active' : 'inactive'">
                                            <i class="bi" th:classappend="${user.isActive != null and user.isActive} ? 'bi-check-circle-fill' : 'bi-x-circle-fill'"></i>
                                            <span th:text="${user.isActive != null and user.isActive} ? 'Active' : 'Locked'"></span>
                                        </span>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Recent Posts -->
                <div class="col-md-6">
                    <div class="admin-table-wrapper">
                        <div class="admin-table-header">
                            <h6><i class="bi bi-file-earmark-text me-2"></i>Bài viết mới nhất</h6>
                            <a th:href="@{/admin/posts}" class="btn btn-sm btn-outline-primary">Xem tất cả</a>
                        </div>
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>Người đăng</th>
                                    <th>Nội dung</th>
                                    <th>Thời gian</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="post : ${recentPosts}">
                                    <td>
                                        <div class="user-info-cell">
                                            <img th:src="@{${post.user.avatar}}" alt="avatar">
                                            <div>
                                                <div class="user-name" th:text="${post.user.name}"></div>
                                            </div>
                                        </div>
                                    </td>
                                    <td>
                                        <div class="content-truncate" th:text="${post.content}"></div>
                                    </td>
                                    <td>
                                        <small class="text-muted"
                                               th:text="${T(vn.hactanco.socialnetwork.helper.TinhThoiGian).timeAgo(post.createdAt)}">
                                        </small>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Chart.js Script -->
    <script th:inline="javascript">
        // Dữ liệu từ server
        const usersByMonth = /*[[${usersByMonth}]]*/ [];
        const postsByMonth = /*[[${postsByMonth}]]*/ [];

        const monthNames = ['Th1', 'Th2', 'Th3', 'Th4', 'Th5', 'Th6', 'Th7', 'Th8', 'Th9', 'Th10', 'Th11', 'Th12'];

        function buildChartData(data) {
            const labels = [];
            const values = [];
            data.forEach(row => {
                labels.push(monthNames[row[0] - 1] + '/' + row[1]);
                values.push(row[2]);
            });
            return { labels, values };
        }

        // Users Chart
        const usersData = buildChartData(usersByMonth);
        new Chart(document.getElementById('usersChart'), {
            type: 'bar',
            data: {
                labels: usersData.labels,
                datasets: [{
                    label: 'User mới',
                    data: usersData.values,
                    backgroundColor: 'rgba(79, 70, 229, 0.7)',
                    borderColor: 'rgba(79, 70, 229, 1)',
                    borderWidth: 1,
                    borderRadius: 6
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: {
                    y: { beginAtZero: true, ticks: { stepSize: 1 } }
                }
            }
        });

        // Posts Chart
        const postsData = buildChartData(postsByMonth);
        new Chart(document.getElementById('postsChart'), {
            type: 'bar',
            data: {
                labels: postsData.labels,
                datasets: [{
                    label: 'Bài viết mới',
                    data: postsData.values,
                    backgroundColor: 'rgba(59, 130, 246, 0.7)',
                    borderColor: 'rgba(59, 130, 246, 1)',
                    borderWidth: 1,
                    borderRadius: 6
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: {
                    y: { beginAtZero: true, ticks: { stepSize: 1 } }
                }
            }
        });
    </script>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const successToast = document.getElementById("successToast");
            const errorToast = document.getElementById("errorToast");
            if (successToast) new bootstrap.Toast(successToast, { delay: 3000 }).show();
            if (errorToast) new bootstrap.Toast(errorToast, { delay: 3000 }).show();
        });
    </script>
</body>

</html>
