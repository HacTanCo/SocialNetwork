<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="_csrf" th:content="${_csrf.token}">
	<meta name="_csrf_header" th:content="${_csrf.headerName}">
	<title>MiniInstagram</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/assets/css/instagram-layout.css}">
</head>

<body>
	<!-- TOAST MESSAGE -->
	<div class="toast-container position-fixed top-0 end-0 p-3">

		<!-- Success -->
		<div th:if="${success}" class="toast text-bg-success border-0" id="successToast">

			<div class="d-flex">
				<div class="toast-body" th:text="${success}">
				</div>

				<button class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
			</div>
		</div>

		<!-- Error -->
		<div th:if="${error}" class="toast text-bg-danger border-0" id="errorToast">

			<div class="d-flex">
				<div class="toast-body" th:text="${error}">
				</div>

				<button class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
			</div>
		</div>

	</div>
	<!-- Sidebar Left-->
	<div th:replace="~{layout/sidebar-left :: mobile-sidebar}"></div>
	<div th:replace="~{layout/sidebar-left :: sidebar-left}"></div>
	<div class="content-wrapper min-vh-100" style="margin-left: 280px; margin-right: 300px;">

		<main class="bg-light text-dark px-3 py-3 overflow-auto" style="max-width: 614px; margin: 0 auto;">

			<!-- STORIES -->
			<div class="stories mb-4 d-flex justify-content-center overflow-auto pb-2 pt-2">
				<div class="story-item me-3" th:each="i : ${#numbers.sequence(1,3)}">
					<div class="position-relative">
						<img src="/assets/images/default-avatar.jpg" class="rounded-circle"
							style="width:66px;height:66px;">
					</div>
					<small class="d-block text-center mt-1 text-muted">user</small>
				</div>

				<div class="story-item me-3">
					<div class="rounded-circle bg-secondary d-flex align-items-center justify-content-center"
						style="width:66px;height:66px;">
						<i class="bi bi-plus-lg text-white"></i>
					</div>
				</div>
			</div>
			
			<div id="feed">
			<!-- POSTS -->
			<div th:each="post : ${posts}" class="post mb-4 border rounded bg-white" th:attr="data-post-id=${post.id}">

				<!-- HEADER -->
				<div class="d-flex justify-content-between align-items-center p-3 border-bottom">

					<!-- Bên trái: avatar + tên + thời gian -->
					<div class="d-flex align-items-center">

						<img th:src="@{${post.user.avatar}}" class="rounded-circle me-2"
							style="width:40px;height:40px;">

						<div>

							<div class="fw-bold" th:text="${post.user.name}"></div>

							<small class="text-muted"
								th:text="${T(vn.hactanco.socialnetwork.helper.TinhThoiGian).timeAgo(post.createdAt)}">
							</small>

						</div>

					</div>

					<!-- Bên phải: 3 chấm -->
					<div class="dropdown">

						<button class="btn p-0 border-0 text-muted" type="button" data-bs-toggle="dropdown">
							<i class="bi bi-three-dots fs-5"></i>
						</button>

						<ul class="dropdown-menu dropdown-menu-end"
							style="border: 1px solid #dbdbdb; border-radius: 8px;">

							<!-- Chủ bài -->
							<li th:if="${session.USER.id == post.user.id}">
								<button class="dropdown-item" type="button" onclick="editPost(this)">
									Sửa
								</button>
							</li>

							<li th:if="${session.USER.id == post.user.id}">
								<button class="dropdown-item text-danger" type="button" onclick="deletePost(this)">
									Xóa
								</button>
							</li>

							<!-- Người khác -->
							<li th:if="${session.USER.id != post.user.id}">
								<button class="dropdown-item text-warning" type="button" onclick="reportPost(this)">
									Báo cáo bài viết
								</button>
							</li>

						</ul>

					</div>

				</div>


				<!-- MEDIA -->
				<div th:if="${post.medias != null and !post.medias.isEmpty()}" class="post-media">

					<!-- 1 MEDIA -->
					<div th:if="${#lists.size(post.medias) == 1}" class="media-wrapper">

						<img th:if="${post.medias[0].mediaType.name() == 'IMAGE'}" th:src="${post.medias[0].mediaUrl}">

						<video th:if="${post.medias[0].mediaType.name() == 'VIDEO'}" controls>
							<source th:src="${post.medias[0].mediaUrl}">
						</video>

					</div>


					<!-- MULTIPLE MEDIA -->
					<div th:if="${#lists.size(post.medias) > 1}" th:id="'carousel-' + ${post.id}"
						class="carousel slide">

						<div class="carousel-inner">

							<div th:each="media, stat : ${post.medias}"
								th:class="|carousel-item ${stat.index == 0 ? 'active' : ''}|">

								<div class="media-wrapper">

									<img th:if="${media.mediaType.name() == 'IMAGE'}" th:src="${media.mediaUrl}">

									<video th:if="${media.mediaType.name() == 'VIDEO'}" controls>
										<source th:src="${media.mediaUrl}">
									</video>

								</div>

							</div>

						</div>


						<button class="carousel-control-prev" type="button"
							th:data-bs-target="'#carousel-' + ${post.id}" data-bs-slide="prev">

							<span class="carousel-control-prev-icon"></span>

						</button>

						<button class="carousel-control-next" type="button"
							th:data-bs-target="'#carousel-' + ${post.id}" data-bs-slide="next">

							<span class="carousel-control-next-icon"></span>

						</button>

					</div>

				</div>


				<!-- ACTION -->
				<div class="p-3">

					<div class="d-flex gap-3 mb-2">

						<i class="bi bi-heart fs-5"></i>
						<i class="bi bi-chat fs-5"></i>
						<i class="bi bi-send fs-5"></i>

						<i class="bi bi-bookmark ms-auto fs-5"></i>

					</div>

					<div>

						<span class="fw-bold" th:text="${post.user.name}">
						</span>

						<span class="post-content" th:text="${post.content}"></span>

					</div>

				</div>

			</div>
		</div>
		<div class="text-center mb-4">

			    <button class="btn btn-outline-primary"
			            onclick="loadMore()">
			        Load more
			    </button>

			</div>
		</main>

	</div>

	<!-- Sidebar Phải (gợi ý bạn bè) -->
	<div th:replace="~{layout/sidebar-right :: sidebar-right}"></div>


	<!-- ================== MODALS  ================== -->
	<div th:replace="~{layout/modals :: modals}"></div>

	

	<!--<script th:src="@{/assets/js/like.js}"></script>
	<script th:src="@{/assets/js/comment-modal.js}"></script>-->
	<script th:src="@{/assets/js/editDeltePost.js}"></script>
	<!--<script th:src="@{/assets/js/change-password.js}"></script>
	<script th:src="@{/assets/js/toggleChangePassword.js}"></script>
	<script th:src="@{/assets/js/follow.js}"></script>-->
	<script th:src="@{/assets/js/previewImage.js}"></script>
	<script th:src="@{/assets/js/loadFeed.js}"></script>
	<script>

		document.addEventListener("DOMContentLoaded", function () {

			const successToast = document.getElementById("successToast");
			const errorToast = document.getElementById("errorToast");

			if (successToast) {
				const toast = new bootstrap.Toast(successToast, {delay: 2000});
				toast.show();
			}

			if (errorToast) {
				const toast = new bootstrap.Toast(errorToast, {delay: 2000});
				toast.show();
			}

		});

	</script>
</body>

</html>
