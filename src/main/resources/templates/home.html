<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>MiniInstagram</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/assets/css/instagram-layout.css}">
</head>

<body>

	<!-- Sidebar Left-->
	<div th:replace="~{layout/sidebar-left :: mobile-sidebar}"></div>
	<div th:replace="~{layout/sidebar-left :: sidebar-left}"></div>
	<div class="content-wrapper min-vh-100" style="margin-left: 280px; margin-right: 300px;">

		<!-- Feed Chính -->
		<main class="bg-light text-dark px-3 py-3 overflow-auto" style="max-width: 614px; margin: 0 auto;">

			<!-- Stories (hard-coded) -->
			<div class="stories mb-4 d-flex justify-content-center overflow-auto pb-2 pt-2">
				<!-- Bạn có thể loop nếu có list stories sau này -->
				<div class="story-item me-3" th:each="i : ${#numbers.sequence(1,3)}">
					<div class="position-relative">
						<img src="/assets/images/default-avatar.jpg" class="rounded-circle story-avatar"
							style="width: 66px; height: 66px;" alt="Story">
						<div class="story-ring"></div>
					</div>
					<small class="d-block text-center mt-1 text-white fw-bold small">user</small>
				</div>
				<!-- Add + button -->
				<div class="story-item me-3">
					<div class="rounded-circle bg-secondary d-flex align-items-center justify-content-center border-2"
						style="width: 66px; height: 66px; border-style: dashed; border-color: #dbdbdb;">
						<i class="bi bi-plus-lg text-muted"></i>
					</div>
				</div>
			</div>

			<!-- Posts -->
			<div th:each="post : ${feed}" th:id="'post-' + ${post.postId}" class="post mb-4">

				<!-- Post Header -->
				<div class="d-flex align-items-center p-3 border-bottom" style="border-color: #dbdbdb;">
					<img th:src="@{${post.avatar != null ? post.avatar : '/assets/images/default-avatar.jpg'}}"
						class="rounded-circle me-2" style="width: 40px; height: 40px;" alt="Avatar">
					<div class="flex-grow-1">
						<div class="fw-bold" th:text="${post.fullName}"></div>
					</div>

					<div th:if="${session.user != null and session.user.id == post.userId}" class="dropdown"
						th:attr="data-post-id=${post.postId}">
						<button class="btn p-0 border-0 text-muted" type="button" data-bs-toggle="dropdown">
							<i class="bi bi-three-dots fs-5"></i>
						</button>
						<ul class="dropdown-menu dropdown-menu-end"
							style="border: 1px solid #dbdbdb; border-radius: 8px;">
							<li><button class="dropdown-item" type="button" onclick="editPost(this)">Sửa</button></li>
							<li><button class="dropdown-item text-danger" type="button"
									onclick="deletePost(this)">Xóa</button></li>
						</ul>
					</div>
				</div>

				<!-- Post Image -->
				<div class="post-media">
					<img th:src="@{${post.image}}" class="img-fluid w-100" alt="Post"
						style="aspect-ratio: 1/1; object-fit: cover;">
				</div>

				<!-- Post Actions -->
				<div class="p-3">
					<div class="d-flex align-items-center mb-2">
						<div class="d-flex align-items-center gap-3">
							<!-- Like -->
							<div class="d-flex align-items-center">
								<i th:classappend="${post.liked ? 'bi-heart-fill text-danger' : 'bi-heart'}"
									class="fs-5 me-1" th:onclick="'likePost(this, ' + ${post.postId} + ')'"></i>
								<span th:id="'like-count-' + ${post.postId}" class="fw-semibold"
									th:text="${post.likeCount}"></span>
							</div>

							<!-- Comment -->
							<div class="d-flex align-items-center">
								<i class="bi bi-chat text-dark fs-5 me-1"
									th:onclick="'openCommentModal(' + ${post.postId} + ')'"></i>
								<span th:id="'comment-count-' + ${post.postId}" class="fw-semibold"
									th:text="${post.commentCount}"></span>
							</div>

							<i class="bi bi-send text-dark fs-5"></i>
						</div>

						<i class="bi bi-bookmark ms-auto text-dark fs-5"></i>
					</div>

					<div class="d-flex mb-2">
						<div class="fw-bold me-2" th:text="${post.fullName}"></div>
						<span th:id="'post-content-' + ${post.postId}" th:text="${post.content}"></span>
					</div>

					<div class="comment-list mt-2" th:id="'comment-list-' + ${post.postId}"></div>

					<!-- Input comment (bạn có thể bật lại nếu cần) -->
					<!--
                <div class="mt-2">
                    <input type="text" class="form-control bg-light text-dark border"
                           th:id="'comment-input-' + ${post.postId}"
                           placeholder="Thêm bình luận..." style="border-color: #dbdbdb;"
                           onkeydown="handleCommentKey(event, ${post.postId})">
                </div>
                -->
				</div>
			</div>

		</main>
	</div>

	<!-- Sidebar Phải (gợi ý bạn bè) -->
	<div th:replace="~{layout/sidebar-right :: sidebar-right}"></div>

	
	<!-- ================== MODALS  ================== -->
	<div th:replace="~{layout/modals :: modals}"></div>


	<script th:inline="javascript">
		const contextPath = /*[[@{/}]]*/ '/';
	</script>
	<script th:src="@{/assets/js/like.js}"></script>
	<script th:src="@{/assets/js/comment-modal.js}"></script>
	<script th:src="@{/assets/js/editDeltePost.js}"></script>
	<script th:src="@{/assets/js/change-password.js}"></script>
	<script th:src="@{/assets/js/toggleChangePassword.js}"></script>
	<script th:src="@{/assets/js/follow.js}"></script>
	<script th:src="@{/assets/js/previewImage.js}"></script>

</body>

</html>
