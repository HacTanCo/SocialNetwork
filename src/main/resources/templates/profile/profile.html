<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="_csrf" th:content="${_csrf.token}">
	<meta name="_csrf_header" th:content="${_csrf.headerName}">
	<title>MiniInstagram</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/assets/css/instagram-layout.css}">
	<link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}">
</head>

<body th:attr="data-profile-id=${profileUser.id}">
	<!-- TOAST MESSAGE -->
	<div class="toast-container position-fixed top-0 end-0 p-3">

		<!-- Success -->
		<div th:if="${success}" class="toast text-bg-success border-0" id="successToast">

			<div class="d-flex">
				<div class="toast-body" th:text="${success}">
				</div>

				<button class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
			</div>
		</div>

		<!-- Error -->
		<div th:if="${error}" class="toast text-bg-danger border-0" id="errorToast">

			<div class="d-flex">
				<div class="toast-body" th:text="${error}">
				</div>

				<button class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
			</div>
		</div>

	</div>
	<!-- Sidebar Left-->
	<div th:replace="~{layout/sidebar-left :: mobile-sidebar}"></div>
	<div th:replace="~{layout/sidebar-left :: sidebar-left}"></div>
	<div class="content-wrapper min-vh-100" style="margin-left: 280px; margin-right: 300px;">

		<main class="bg-light text-dark px-3 py-3 overflow-auto" style="max-width: 614px; margin: 0 auto;">


			<!-- PROFILE HEADER -->
			<div class="bg-white border rounded p-4 mb-4">

				<div class="row align-items-center">

					<!-- AVATAR -->
					<div class="col-4 text-center">
						<img th:src="@{${profileUser.avatar}}" class="rounded-circle"
							style="width:120px;height:120px;object-fit:cover; cursor:pointer;" data-bs-toggle="modal"
							data-bs-target="#viewAvatarModal">
					</div>

					<!-- INFO -->
					<div class="col-8">

						<!-- USERNAME + BUTTON -->
						<div class="d-flex align-items-center gap-3 mb-2">

							<h4 class="mb-0" th:text="${profileUser.name}"></h4>

							<!-- Chính mình -->

							<button th:if="${currentUser.id == profileUser.id}" class="btn btn-outline-secondary btn-sm"
								data-bs-toggle="modal" data-bs-target="#editProfileModal">
								Chỉnh sửa
							</button>

							<!-- Là bạn -->
							<div th:if="${currentUser.id != profileUser.id and isFriend}" class="dropdown">

								<button class="btn btn-secondary btn-sm dropdown-toggle" type="button"
									data-bs-toggle="dropdown">
									Bạn bè
								</button>

								<ul class="dropdown-menu">

									<li>
										<form method="post" th:action="@{/friend/remove-profile}">
											<input type="hidden" name="friend_id" th:value="${profileUser.id}">
											<button class="dropdown-item text-danger">
												<i class="bi bi-person-x"></i> Hủy kết bạn
											</button>
										</form>
									</li>

								</ul>
							</div>
							<!-- Nếu đã gửi lời mời -->
							<button th:if="${currentUser.id != profileUser.id and !isFriend and isPending}"
								class="btn btn-outline-primary btn-sm"
								th:attr="onclick='toggleFollow(this, ' + ${profileUser.id} + ')'">
								Hủy lời mời
							</button>
							<!-- Nếu chưa có gì -->
							<button th:if="${currentUser.id != profileUser.id and !isFriend and !isPending}"
								class="btn btn-outline-primary btn-sm"
								th:attr="onclick='toggleFollow(this, ' + ${profileUser.id} + ')'">
								Kết bạn
							</button>

						</div>

						<!-- STATS -->
						<div class="d-flex gap-4 mb-2">

							<div>
								<strong th:text="${postCount}">0</strong> bài viết
							</div>

							<div style="cursor:pointer;" onclick="openFriendsModal()">
								<strong th:text="${friendCount}">0</strong> bạn bè
							</div>

						</div>

						<!-- BIO -->
						<div>
							<div th:text="${profileUser.bio}"></div>
						</div>

					</div>

				</div>

			</div>

			<div id="feed">
				<!-- POSTS -->
				<div th:each="post : ${posts}" class="post mb-4 border rounded bg-white"
					th:attr="data-post-id=${post.postId}">

					<!-- HEADER -->
					<div class="d-flex justify-content-between align-items-center p-3 border-bottom">

						<!-- Bên trái: avatar + tên + thời gian -->
						<div class="d-flex align-items-center">

							<img th:src="@{${post.userAvatar}}" class="rounded-circle me-2"
								style="width:40px;height:40px;">

							<div>

								<div class="fw-bold" th:text="${post.userName}"></div>

								<small class="text-muted"
									th:text="${T(vn.hactanco.socialnetwork.helper.TinhThoiGian).timeAgo(post.createdAt)}">
								</small>

							</div>

						</div>

						<!-- Bên phải: 3 chấm -->
						<div class="dropdown">

							<button class="btn p-0 border-0 text-muted" type="button" data-bs-toggle="dropdown">
								<i class="bi bi-three-dots fs-5"></i>
							</button>

							<ul class="dropdown-menu dropdown-menu-end"
								style="border: 1px solid #dbdbdb; border-radius: 8px;">

								<!-- Chủ bài -->
								<li th:if="${session.USER.id == post.userId}">
									<button class="dropdown-item" type="button" onclick="editPost(this)">
										Sửa
									</button>
								</li>

								<li th:if="${session.USER.id == post.userId}">
									<button class="dropdown-item text-danger" type="button" onclick="deletePost(this)">
										Xóa
									</button>
								</li>

								<!-- Người khác -->
								<li th:if="${session.USER.id != post.userId}">
									<button class="dropdown-item text-warning" type="button" onclick="reportPost(this)">
										Báo cáo bài viết
									</button>
								</li>

							</ul>

						</div>

					</div>


					<!-- MEDIA -->
					<div th:if="${post.medias != null and !post.medias.isEmpty()}" class="post-media">

						<!-- 1 MEDIA -->
						<div th:if="${#lists.size(post.medias) == 1}" class="media-wrapper">

							<img th:if="${post.medias[0].mediaType.name() == 'IMAGE'}"
								th:src="${post.medias[0].mediaUrl}">

							<video th:if="${post.medias[0].mediaType.name() == 'VIDEO'}" controls>
								<source th:src="${post.medias[0].mediaUrl}">
							</video>

						</div>


						<!-- MULTIPLE MEDIA -->
						<div th:if="${#lists.size(post.medias) > 1}" th:id="'carousel-' + ${post.postId}"
							class="carousel slide">

							<div class="carousel-inner">

								<div th:each="media, stat : ${post.medias}"
									th:class="|carousel-item ${stat.index == 0 ? 'active' : ''}|">

									<div class="media-wrapper">

										<img th:if="${media.mediaType.name() == 'IMAGE'}" th:src="${media.mediaUrl}">

										<video th:if="${media.mediaType.name() == 'VIDEO'}" controls>
											<source th:src="${media.mediaUrl}">
										</video>

									</div>

								</div>

							</div>


							<button class="carousel-control-prev" type="button"
								th:data-bs-target="'#carousel-' + ${post.postId}" data-bs-slide="prev">

								<span class="carousel-control-prev-icon"></span>

							</button>

							<button class="carousel-control-next" type="button"
								th:data-bs-target="'#carousel-' + ${post.postId}" data-bs-slide="next">

								<span class="carousel-control-next-icon"></span>

							</button>

						</div>

					</div>


					<!-- ACTION -->
					<div class="p-3">

						<div class="d-flex gap-3 mb-2 align-items-center">

							<!-- LIKE -->
							<div class="d-flex align-items-center gap-1">
								<i class="bi fs-5"
									th:classappend="${post.liked} ? 'bi-heart-fill text-danger' : 'bi-heart'"
									th:onclick="'likePost(this, ' + ${post.postId} + ')'">
								</i>
								<span th:id="'like-count-' + ${post.postId}" th:text="${post.likeCount}">0</span>
							</div>

							<!-- COMMENT -->
							<div class="d-flex align-items-center gap-1">
								<i class="bi bi-chat fs-5" th:onclick="'openCommentModal(' + ${post.postId} + ')'"> </i>
								<span class="comment-count" th:attr="data-post-id=${post.postId}"
									th:text="${post.commentCount}">
									0
								</span>
							</div>
							<!-- SHARE -->
							<i class="bi bi-send fs-5"></i>

							<!-- BOOKMARK -->
							<i class="bi bi-bookmark ms-auto fs-5"></i>

						</div>

						<!-- CONTENT -->
						<div>
							<span class="fw-bold" th:text="${post.userName}"></span>
							<span class="post-content" th:text="${post.content}"></span>
						</div>

					</div>

				</div>
			</div>
			<div class="text-center mb-4">

				<button class="btn btn-outline-primary" onclick="loadMore()">
					Load more
				</button>

			</div>
		</main>

	</div>

	<!-- Sidebar Phải (gợi ý bạn bè) -->
	<div th:replace="~{layout/sidebar-right :: sidebar-right}"></div>


	<!-- ================== MODALS  ================== -->
	<div th:replace="~{layout/modals :: modals}"></div>

	<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>

	<script th:src="@{/assets/js/notification.js}"></script>
	<script th:src="@{/assets/js/like.js}"></script>
	<script th:src="@{/assets/js/commentModal.js}"></script>
	<script th:src="@{/assets/js/editDeltePost.js}"></script>
	<script th:src="@{/assets/js/changePassword.js}"></script>
	<script th:src="@{/assets/js/toggleChangePassword.js}"></script>
	<script th:src="@{/assets/js/follow.js}"></script>
	<script th:src="@{/assets/js/previewImage.js}"></script>
	<script th:src="@{/assets/js/previewAvatarToHon.js}"></script>
	<script th:src="@{/assets/js/loadFeed.js}"></script>
	<script th:src="@{/assets/js/friendsModal.js}"></script>
	<script>

		document.addEventListener("DOMContentLoaded", function () {

			const successToast = document.getElementById("successToast");
			const errorToast = document.getElementById("errorToast");

			if (successToast) {
				const toast = new bootstrap.Toast(successToast, {delay: 2000});
				toast.show();
			}

			if (errorToast) {
				const toast = new bootstrap.Toast(errorToast, {delay: 2000});
				toast.show();
			}

		});

	</script>
	<script>
		window.currentUserId = [[${session.USER.id}]];
		loadUnreadCount();
		loadUnreadMessageCount();
	</script>
	<!-- Xem avatar-->
	<div class="modal fade" id="viewAvatarModal" tabindex="-1">
		<div class="modal-dialog modal-dialog-centered">
			<div class="modal-content bg-transparent border-0">

				<!-- nút đóng -->
				<button type="button" class="btn-close position-absolute top-0 end-0 m-3 bg-white"
					data-bs-dismiss="modal">
				</button>

				<!-- ảnh lớn -->
				<img th:src="${profileUser.avatar}" class="w-100 rounded" style="max-height:80vh; object-fit:contain;">
			</div>
		</div>
	</div>
</body>

</html>
