<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<aside class="sidebar-right d-none d-xl-block" th:fragment="sidebar-right">
		<div class="d-flex align-items-center p-3 border-bottom" style="border-color:#dbdbdb;">
			<img th:src="${session.USER.avatar}" class="rounded-circle me-3"
				style="width:44px;height:44px;">
			<div class="fw-bold" th:text="${session.USER.name}"></div>
		</div>
		
		<div class="mt-1">
			<div class="d-flex justify-content-between align-items-center mb-2">
				<h6 class="mb-0">Gợi ý cho bạn</h6>
				<small class="text-muted">Xem tất cả</small>
			</div>

			<div th:each="sug : ${suggestions}" class="d-flex align-items-center mb-1">
				<img th:src="${sug.avatar}"
					class="rounded-circle me-2" style="width:44px;height:44px;">
				<div class="flex-grow-1">
					<div class="fw-bold small" th:text="${sug.name}"></div>
				</div>
				<button class="btn btn-outline-secondary btn-sm" th:onclick="'toggleFollow(this, ' + ${sug.userId} + ')'">
					Kết bạn
				</button>
			</div>
		</div>

		<!-- Footer -->
		<footer th:fragment="footer">
		    <div style="background:#eee;" class="p-3">
		        
		        <!-- Phần các link - căn giữa hoàn toàn -->
		        <div class="d-flex justify-content-center gap-3 flex-wrap mb-2">
		            <a href="https://www.facebook.com/Turquois6" target="_blank" 
		               class="text-muted text-decoration-none">Giới thiệu</a>
		            <a href="https://www.facebook.com/Turquois6" target="_blank" 
		               class="text-muted text-decoration-none">Blog</a>
		            <a href="https://www.facebook.com/Turquois6" target="_blank" 
		               class="text-muted text-decoration-none">Nhân viên</a>
		            <a href="https://www.facebook.com/Turquois6" target="_blank" 
		               class="text-muted text-decoration-none">Ứng dụng</a>
		            <a href="https://www.facebook.com/Turquois6" target="_blank" 
		               class="text-muted text-decoration-none">Công việc</a>
		            <a href="https://www.facebook.com/Turquois6" target="_blank" 
		               class="text-muted text-decoration-none">Pháp lý</a>
		        </div>

		        <!-- Phần bản quyền - cũng căn giữa -->
		        <div class="text-center">
		            <small class="text-muted">
		                <i class="bi bi-instagram me-1"></i>
		                Instagram © 2025 · <strong>HacTanCo</strong>
		            </small>
		        </div>

		    </div>
		</footer>
	</aside>


</html>
