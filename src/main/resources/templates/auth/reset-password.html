<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Reset Password</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

	<link rel="stylesheet" th:href="@{/assets/css/auth.css}">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
	<div class="toast-container position-fixed top-0 end-0 p-3">

			<!-- Success -->
			<div th:if="${success}" class="toast text-bg-success border-0" id="successToast">

				<div class="d-flex">

					<div class="toast-body" th:text="${success}">
					</div>

					<button class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>

				</div>
			</div>

			<!-- Error -->
			<div th:if="${error}" class="toast text-bg-danger border-0" id="errorToast">

				<div class="d-flex">

					<div class="toast-body" th:text="${error}">
					</div>

					<button class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>

				</div>
			</div>

		</div>
	<div class="form-login">

		<h2 class="brand-title mb-4">
			<i class="bi bi-instagram me-2"></i>
			Instagram
		</h2>

		<h4 class="text-center mb-4 text-muted">Reset Password</h4>

		<form th:action="@{/reset-password}" method="post" th:object="${resetPasswordRequest}" id="resetForm">
			
			
			<!-- Password -->
			<div class="mb-3">

				<label for="newPassword" class="form-label">
					<i class="bi bi-lock me-1"></i>New Password
				</label>

				<div class="input-group">
					<input  type="password" th:field="*{newPassword}" class="form-control" 
										th:classappend="${#fields.hasErrors('newPassword')} ? 'is-invalid'">
	                										
					<span class="input-group-text" style="cursor:pointer" onclick="togglePassword('newPassword','icon1')">

						<i id="icon1" class="bi bi-eye"></i>

					</span>
				    <span th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}" class="invalid-feedback" />
				</div>

			</div>

			<!-- Confirm -->
			<div class="mb-3">

				<label for="confirmPassword" class="form-label">
					<i class="bi bi-lock-fill me-1"></i>Confirm Password
				</label>

				<div class="input-group">

					
					<input type="password" th:field="*{confirmPassword}" class="form-control"
															th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'">
					<span class="input-group-text" style="cursor:pointer" onclick="togglePassword('confirmPassword','icon2')">

						<i id="icon2" class="bi bi-eye"></i>

					</span>
			        <span th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}" class="invalid-feedback" />
				</div>

			</div>

			<button type="submit" class="btn btn-register text-white">

				<i class="bi bi-arrow-repeat me-2"></i>
				Reset Password

			</button>

		</form>

	</div>

	<script th:src="@{/assets/js/togglePasswordForEmail.js}"></script>

	<script>
			// Show toast if success or error message exists
			document.addEventListener('DOMContentLoaded', function () {
				var successToast = document.getElementById('successToast');
				var errorToast = document.getElementById('errorToast');

				if (successToast) {
					var toast = new bootstrap.Toast(successToast);
					toast.show();
				}

				if (errorToast) {
					var toast = new bootstrap.Toast(errorToast);
					toast.show();
				}
			});
		</script>

</body>

</html>
