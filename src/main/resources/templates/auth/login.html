<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Login</title>

	<!-- Bootstrap -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

	<!-- Bootstrap Icons -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

	<!-- Custom CSS -->
	<link rel="stylesheet" th:href="@{/assets/css/auth.css}">

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
	<!-- TOAST MESSAGE -->
	<div class="toast-container position-fixed top-0 end-0 p-3">

		<!-- Success -->
		<div th:if="${success}" class="toast text-bg-success border-0" id="successToast">

			<div class="d-flex">
				<div class="toast-body" th:text="${success}">
				</div>

				<button class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
			</div>
		</div>

		<!-- Error -->
		<div th:if="${error}" class="toast text-bg-danger border-0" id="errorToast">

			<div class="d-flex">
				<div class="toast-body" th:text="${error}">
				</div>

				<button class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
			</div>
		</div>

	</div>
	<div class="form-login">

		<h2 class="brand-title mb-4">
			<i class="bi bi-instagram me-2"></i>
			Instagram
		</h2>

		<h4 class="text-center mb-4 text-muted">Login</h4>


		<!-- FORM -->
		<form th:action="@{/login}" th:object="${user}" method="post">

			
			<div class="mb-3">

				<label for="email" class="form-label">
					<i class="bi bi-envelope me-1"></i>Email
				</label>

				<input type="text" th:field="*{email}" class="form-control"
					th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
				<span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="invalid-feedback" />

			</div>


			<div class="mb-3">

				<label class="form-label">
					<i class="bi bi-lock me-1"></i>Mật khẩu
				</label>

				<div class="input-group">

					<input type="password" th:field="*{password}" id="password" class="form-control" 
						th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'">

					<span class="input-group-text" style="cursor:pointer" onclick="togglePasswordLogin()">

						<i id="toggleIcon" class="bi bi-eye"></i>

					</span>
				    <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="invalid-feedback" />
				</div>

			</div>


			<button type="submit" class="btn btn-register text-white">

				<i class="bi bi-box-arrow-in-right me-2"></i>
				Đăng nhập

			</button>

		</form>


		<div class="login-link">

			<p>
				Bạn chưa có tài khoản?
				<a th:href="@{/register}">
					Đăng ký ngay
				</a>
			</p>

			<p>
				Bạn quên mật khẩu?
				<a th:href="@{/forgot-password}">
					Quên mật khẩu
				</a>
			</p>

		</div>

	</div>


	<script th:src="@{/assets/js/togglePassword.js}"></script>


	<script>

		document.addEventListener("DOMContentLoaded", function () {

			const successToast = document.getElementById("successToast");
			const errorToast = document.getElementById("errorToast");

			if (successToast) {
				const toast = new bootstrap.Toast(successToast, {delay: 2000});
				toast.show();
			}

			if (errorToast) {
				const toast = new bootstrap.Toast(errorToast, {delay: 2000});
				toast.show();
			}

		});

	</script>

</body>

</html>
