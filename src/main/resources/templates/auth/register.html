<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Register</title>

	<!-- Bootstrap -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

	<!-- Bootstrap Icons -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

	<!-- Custom CSS -->
	<link rel="stylesheet" th:href="@{/assets/css/auth.css}">

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
	<div class="toast-container position-fixed top-0 end-0 p-3">

		<!-- Success -->
		<div th:if="${success}" class="toast text-bg-success border-0" id="successToast">

			<div class="d-flex">

				<div class="toast-body" th:text="${success}">
				</div>

				<button class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>

			</div>
		</div>

		<!-- Error -->
		<div th:if="${error}" class="toast text-bg-danger border-0" id="errorToast">

			<div class="d-flex">

				<div class="toast-body" th:text="${error}">
				</div>

				<button class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>

			</div>
		</div>

	</div>
	<div class="form-login">

		<h2 class="brand-title mb-4">
			<i class="bi bi-instagram me-2"></i>
			Instagram
		</h2>

		<h4 class="text-center mb-4 text-muted">Register</h4>





		<!-- FORM -->
		<form th:action="@{/register}" th:object="${user}" method="post">

			<div class="mb-3">
				<label for="email" class="form-label">
					<i class="bi bi-envelope me-1"></i>Email
				</label>

				<input type="text" th:field="*{email}" class="form-control"
					th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
				<span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="invalid-feedback" />

			</div>


			<div class="mb-3">
				<label for="password" class="form-label">
					<i class="bi bi-lock me-1"></i>Mật khẩu
				</label>

				<div class="input-group">

					<input type="password" th:field="*{password}" class="form-control"
						th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'">


					<span class="input-group-text" style="cursor: pointer;" onclick="togglePasswordRegister('password', this)">

						<i id="toggleIcon" class="bi bi-eye"></i>

					</span>
					<span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="invalid-feedback" />
				</div>
			</div>
			<div class="mb-3">
				<label for="confirmPassword" class="form-label">
					<i class="bi bi-lock-fill me-1"></i>Xác nhận mật khẩu
				</label>

				<div class="input-group">

					<input type="password" th:field="*{confirmPassword}" class="form-control"
						th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'">


					<span class="input-group-text" style="cursor: pointer;" onclick="togglePasswordRegister('confirmPassword', this)">

						<i id="toggleIcon" class="bi bi-eye"></i>

					</span>
					<span th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}" class="invalid-feedback" />
				</div>
			</div>

			<div class="mb-3">

				<label for="name" class="form-label">
					<i class="bi bi-person me-1"></i>Họ và tên
				</label>

				<input type="text" th:field="*{name}" class="form-control"
					th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
				<span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="invalid-feedback" />
			</div>


			<button type="submit" class="btn btn-register text-white">

				<i class="bi bi-person-plus me-2"></i>
				Đăng ký

			</button>

		</form>


		<div class="login-link">

			<p>
				Đã có tài khoản?
				<a th:href="@{/login}">Đăng nhập ngay</a>
			</p>

		</div>

	</div>


	<script th:src="@{/assets/js/togglePassword.js}"></script>
	<script>
		// Show toast if success or error message exists
		document.addEventListener('DOMContentLoaded', function () {
			var successToast = document.getElementById('successToast');
			var errorToast = document.getElementById('errorToast');

			if (successToast) {
				var toast = new bootstrap.Toast(successToast);
				toast.show();
			}

			if (errorToast) {
				var toast = new bootstrap.Toast(errorToast);
				toast.show();
			}
		});
	</script>
</body>

</html>
