<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Verify OTP</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

	<link rel="stylesheet" th:href="@{/assets/css/auth.css}">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
	<div class="toast-container position-fixed top-0 end-0 p-3">

			<!-- Success -->
			<div th:if="${success}" class="toast text-bg-success border-0" id="successToast">

				<div class="d-flex">

					<div class="toast-body" th:text="${success}"></div>

					<button class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>

				</div>
			</div>

			<!-- Error -->
			<div th:if="${error}" class="toast text-bg-danger border-0" id="errorToast">

				<div class="d-flex">

					<div class="toast-body" th:text="${error}"></div>

					<button class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>

				</div>
			</div>

		</div>
	<div class="form-login">

		<h2 class="brand-title mb-4">
			<i class="bi bi-instagram me-2"></i>
			Instagram
		</h2>

		<h4 class="text-center mb-4 text-muted">Verify OTP</h4>

		

		<!-- Verify OTP -->
		<form th:action="@{/verify-otp}" th:object="${verifyOtpRequest}" method="post">

			

			<div class="mb-3">
				<label for="otp" class="form-label">
					<i class="bi bi-shield-lock me-1"></i>OTP Code
				</label>

				<input type="text" th:field="*{otp}" class="form-control" placeholder="Enter 6-digit OTP"
					th:classappend="${#fields.hasErrors('otp')} ? 'is-invalid'">
				<span th:if="${#fields.hasErrors('otp')}" th:errors="*{otp}" class="invalid-feedback" />

			</div>

			<button type="submit" class="btn btn-register text-white">
				<i class="bi bi-check-circle me-2"></i>Verify OTP
			</button>

		</form>

		<!-- Resend OTP -->
		<form th:action="@{/verify-otp}" method="post">

			<input type="hidden" name="action" value="resend">

			<button type="submit" class="btn btn-link w-100 text-decoration-none">

				<i class="bi bi-arrow-clockwise me-1"></i>Resend OTP

			</button>

		</form>

	</div>
	<script>
			document.addEventListener('DOMContentLoaded', function () {

				const successToast = document.getElementById('successToast');
				const errorToast = document.getElementById('errorToast');

				if (successToast) {
					new bootstrap.Toast(successToast).show();
				}

				if (errorToast) {
					new bootstrap.Toast(errorToast).show();
				}

			});
		</script>


</body>

</html>
