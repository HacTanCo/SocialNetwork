<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truy cập bị từ chối</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/assets/css/auth.css}">
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}">

    <style>
        .access-denied-card {
            text-align: center;
            max-width: 480px;
        }

        .denied-icon {
            font-size: 5rem;
            color: #E4405F;
            animation: shake 0.6s ease;
        }

        .denied-code {
            font-size: 6rem;
            font-weight: 800;
            background: linear-gradient(45deg, #FD1D1D, #833AB4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 8px;
        }

        .denied-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: #262626;
            margin-bottom: 12px;
        }

        .denied-desc {
            color: #8e8e8e;
            margin-bottom: 24px;
        }

        .btn-home {
            padding: 12px 32px;
            border-radius: 10px;
            font-weight: 600;
            border: none;
            color: #fff;
            background: linear-gradient(45deg, #FD1D1D, #833AB4);
            text-decoration: none;
            transition: all 0.25s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-home:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(253, 29, 29, 0.35);
            color: #fff;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-8px);
            }

            40% {
                transform: translateX(8px);
            }

            60% {
                transform: translateX(-4px);
            }

            80% {
                transform: translateX(4px);
            }
        }
    </style>
</head>

<body>
    <div class="form-login access-denied-card">
        <div class="denied-icon">
            <i class="bi bi-shield-x"></i>
        </div>

        <div class="denied-code">403</div>

        <div class="denied-title">Truy cập bị từ chối</div>

        <p class="denied-desc">
            Bạn không có quyền truy cập trang này.
        </p>

        <a th:href="@{/home}" class="btn-home">
            <i class="bi bi-house-fill"></i>
            Quay về trang chủ
        </a>
    </div>
</body>

</html>
